<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>¡Felices 6 Años Santi!</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue: #2979ff;
      --yellow: #ffd600;
      --red: #ff1744;
      --green: #00e676;
      --purple: #d500f9;
      --orange: #ff6d00;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #06040d;
      font-family: 'Nunito', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      color: #fff;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== CONFETTI & EFFECTS ===== */
    #confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    /* ===== STARS & NEBULAS ===== */
    .stars-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      background: 
        radial-gradient(circle at 10% 20%, rgba(41, 121, 255, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(213, 0, 249, 0.08) 0%, transparent 40%);
    }
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      opacity: 0.3;
      animation: pulseStar var(--dur, 2s) infinite alternate;
    }
    @keyframes pulseStar {
      from { opacity: 0.1; transform: scale(0.8); }
      to { opacity: 0.9; transform: scale(1.3); }
    }

    /* ===== BALLOONS WITH WOBBLE ===== */
    .balloons-container {
      position: fixed;
      bottom: -80px;
      width: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .balloon {
      position: absolute;
      width: 45px;
      height: 55px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      animation: floatUp var(--speed, 8s) ease-in-out infinite, swing var(--swing-speed, 3s) ease-in-out infinite alternate;
      animation-delay: var(--delay, 0s);
      opacity: 0.75;
    }
    .balloon::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,0.3);
    }
    @keyframes floatUp {
      0%   { transform: translateY(0); opacity: 0.75; }
      80%  { opacity: 0.75; }
      100% { transform: translateY(-115vh); opacity: 0; }
    }
    @keyframes swing {
      0% { margin-left: -15px; }
      100% { margin-left: 15px; }
    }

    /* ===== MAIN WRAPPER WITH LOAD ANIMATION ===== */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding: 30px 16px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      animation: fadeInPage 1s ease-out;
    }
    @keyframes fadeInPage {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== HEADER WITH 3D NEON TEXT ===== */
    .header-section {
      text-align: center;
      width: 100%;
    }
    .header-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.4rem, 11vw, 4.6rem);
      color: var(--yellow);
      text-shadow:
        0 0 20px rgba(253,216,53,0.4),
        3px 3px 0 var(--red),
        6px 6px 0 var(--purple);
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 8px;
      animation: floatTitle 3s ease-in-out infinite alternate;
    }
    .header-subtitle {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: clamp(0.9rem, 3.8vw, 1.25rem);
      color: #00e676;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(0,230,118,0.3);
    }
    @keyframes floatTitle {
      0% { transform: translateY(0) rotate(-1deg); }
      100% { transform: translateY(-8px) rotate(1deg); }
    }

    /* ===== GLOWING FAMILY CARD ===== */
    .family-card {
      width: 100%;
      border-radius: 28px;
      overflow: hidden;
      border: 4px solid var(--yellow);
      box-shadow: 
        0 0 30px rgba(255,214,0,0.25),
        0 20px 40px rgba(0,0,0,0.6);
      background: #000;
      animation: glowPulseYellow 4s infinite alternate;
      transition: transform 0.3s;
    }
    @keyframes glowPulseYellow {
      0% { box-shadow: 0 0 20px rgba(255,214,0,0.2), 0 20px 40px rgba(0,0,0,0.6); }
      100% { box-shadow: 0 0 35px rgba(255,214,0,0.45), 0 20px 40px rgba(0,0,0,0.6); }
    }
    .family-card img {
      width: 100%;
      display: block;
      height: auto;
    }

    /* ===== GLOWING VIDEO CARD ===== */
    .video-card-link {
      width: 100%;
      border-radius: 28px;
      overflow: hidden;
      border: 4px solid var(--blue);
      box-shadow: 
        0 0 30px rgba(41,121,255,0.25),
        0 20px 40px rgba(0,0,0,0.6);
      background: linear-gradient(135deg, #151035, #080616);
      position: relative;
      padding: 40px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-decoration: none;
      cursor: pointer;
      animation: glowPulseBlue 4s infinite alternate 1s;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    @keyframes glowPulseBlue {
      0% { box-shadow: 0 0 20px rgba(41,121,255,0.2), 0 20px 40px rgba(0,0,0,0.6); }
      100% { box-shadow: 0 0 35px rgba(41,121,255,0.45), 0 20px 40px rgba(0,0,0,0.6); }
    }
    .video-card-link:active {
      transform: scale(0.97);
    }
    .play-button-icon {
      width: 75px;
      height: 75px;
      background: var(--red);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(229,57,53,0.5);
      position: relative;
      animation: pulsePlay 1.2s infinite;
    }
    .play-button-icon::after {
      content: '';
      display: block;
      width: 0;
      height: 0;
      border-top: 14px solid transparent;
      border-bottom: 14px solid transparent;
      border-left: 22px solid #fff;
      margin-left: 6px;
    }
    @keyframes pulsePlay {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(229,57,53,0.6); }
      70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(229,57,53,0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(229,57,53,0); }
    }
    .video-text {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.25rem, 5vw, 1.8rem);
      color: #fff;
      text-align: center;
    }
    .video-subtext {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      color: #42a5f5;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* ===== CHARACTERS GRID (CIRCULAR BADGES FOR PREMIUM LOOK) ===== */
    .characters-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .char-card {
      background: rgba(255,255,255,0.02);
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 20px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s, border-color 0.3s;
    }
    .char-card:active {
      transform: scale(0.94);
    }
    .char-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 30px var(--glow);
      border-color: var(--color);
      background: rgba(255,255,255,0.05);
    }

    /* Circular Avatar Badge to hide checkered patterns and look official */
    .char-badge-wrap {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: var(--bg-grad);
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.4), 0 8px 20px rgba(0,0,0,0.4);
      border: 3px solid var(--color);
      position: relative;
      overflow: hidden;
    }
    .char-img {
      width: 95%;
      height: 95%;
      object-fit: cover;
      border-radius: 50%;
      pointer-events: none;
      animation: floatChar 3s ease-in-out infinite alternate;
      animation-delay: var(--delay, 0s);
    }
    @keyframes floatChar {
      from { transform: translateY(2px) scale(1); }
      to { transform: translateY(-4px) scale(1.04); }
    }
    .char-name {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.1rem, 4vw, 1.4rem);
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      text-align: center;
    }

    /* Character specific styling */
    .char-sonic  { --color: var(--blue);   --glow: rgba(41,121,255,0.3);  --bg-grad: radial-gradient(circle, #1976d2, #0d47a1); --delay: 0s; }
    .char-goku   { --color: var(--orange); --glow: rgba(255,109,0,0.3);  --bg-grad: radial-gradient(circle, #ff9100, #e65100); --delay: 0.4s; }
    .char-spider { --color: var(--red);    --glow: rgba(255,23,68,0.3);   --bg-grad: radial-gradient(circle, #d50000, #ff1744); --delay: 0.8s; }
    .char-woody  { --color: var(--green);  --glow: rgba(0,230,118,0.3);   --bg-grad: radial-gradient(circle, #00c853, #1b5e20); --delay: 1.2s; }
    .char-mario  { --color: #e52521;       --glow: rgba(229,37,33,0.35);  --bg-grad: radial-gradient(circle, #e52521, #7f0000); --delay: 1.6s; }

    /* Centrar la última tarjeta si es impar en la cuadrícula de 2 columnas */
    .char-card:last-child:nth-child(odd) {
      grid-column: span 2;
    }



    /* Screen shake when click char */
    .shake-anim {
      animation: shakeEffect 0.4s ease;
    }
    @keyframes shakeEffect {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    /* Responsive adjustments */
    @media (max-width: 600px) {
      .char-badge-wrap {
        width: 90px;
        height: 90px;
      }
      .container {
        gap: 28px;
      }
    }

    /* ===== BOTÓN DE PAUSA GLOBAL ===== */
    .global-pause-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
      background: rgba(255, 23, 68, 0.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 2px solid var(--red);
      border-radius: 50px;
      color: #fff;
      padding: 12px 24px;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(255, 23, 68, 0.25);
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.2s, box-shadow 0.2s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .global-pause-btn:hover {
      background: rgba(255, 23, 68, 0.45);
      box-shadow: 0 12px 40px rgba(255, 23, 68, 0.45);
      transform: translateY(-3px) scale(1.05);
    }
    .global-pause-btn:active {
      transform: scale(0.95);
    }
    .global-pause-btn svg {
      transition: transform 0.2s;
    }
    .global-pause-btn:hover svg {
      transform: scale(1.15);
    }
    @media (max-width: 600px) {
      .global-pause-btn {
        bottom: 16px;
        right: 16px;
        padding: 10px 18px;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>

  <!-- Stars & Nebulas -->
  <div class="stars-bg" id="stars-bg"></div>

  <!-- Confetti Canvas -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Balloons -->
  <div class="balloons-container" id="balloons-container"></div>

  <!-- Botón de Pausa Flotante Premium -->
  <button class="global-pause-btn" onclick="pauseAllAudio()" aria-label="Pausar todos los audios">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
      <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
    </svg>
    <span>Pausar</span>
  </button>

  <div class="container" id="main-container">
    
    <!-- Title Section -->
    <div class="header-section">
      <h1 class="header-title">¡Felices 6 años Santi!</h1>
      <p class="header-subtitle">Tus superhéroes favoritos te saludan</p>
    </div>

    <!-- Family Photo -->
    <div class="family-card" onclick="triggerCardSparkle(this)">
      <img src="family.jpg" alt="Santi y su familia" />
    </div>

    <!-- Video Link -->
    <a href="https://www.youtube.com/watch?v=C2s2JyZZVEc" target="_blank" class="video-card-link">
      <div class="play-button-icon"></div>
      <div class="video-text">Ver tu video de cumpleaños</div>
      <div class="video-subtext">Haz clic para reproducir</div>
    </a>

    <!-- Characters Grid -->
    <div class="characters-grid">
      <!-- Sonic -->
      <div class="char-card char-sonic" onclick="charClick(this)">
        <div class="char-badge-wrap">
          <img src="sonic.png" class="char-img" alt="Sonic" />
        </div>
        <span class="char-name">Sonic</span>
      </div>
      <!-- Goku -->
      <div class="char-card char-goku" onclick="charClick(this)">
        <div class="char-badge-wrap">
          <img src="goku.png" class="char-img" alt="Goku" />
        </div>
        <span class="char-name">Goku</span>
      </div>
      <!-- Spider-Man -->
      <div class="char-card char-spider" onclick="charClick(this)">
        <div class="char-badge-wrap">
          <img src="spiderman.png" class="char-img" style="object-position: center 20%;" alt="Spider-Man" />
        </div>
        <span class="char-name">Spider-Man</span>
      </div>
      <!-- Toy Story -->
      <div class="char-card char-woody" onclick="charClick(this)">
        <div class="char-badge-wrap">
          <img src="toystory.png" class="char-img" alt="Woody & Buzz" />
        </div>
        <span class="char-name">Woody & Buzz</span>
      </div>
      <!-- Mario -->
      <div class="char-card char-mario" onclick="charClick(this)">
        <div class="char-badge-wrap">
          <img src="mario.png" class="char-img" alt="Mario" />
        </div>
        <span class="char-name">Mario</span>
      </div>
    </div>



  </div>

  <script>
    /* ===== BACKGROUND STARS ===== */
    (function initStars() {
      const bg = document.getElementById('stars-bg');
      for (let i = 0; i < 70; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--dur', (Math.random() * 3 + 1.5).toFixed(1) + 's');
        star.style.animationDelay = Math.random() * 2 + 's';
        bg.appendChild(star);
      }
    })();

    /* ===== BALLOONS ===== */
    (function createBalloons() {
      const colors = ['#ff1744','#2979ff','#ffd600','#00e676','#d500f9','#ff6d00'];
      const container = document.getElementById('balloons-container');
      const numBalloons = window.innerWidth < 600 ? 8 : 14;
      for (let i = 0; i < numBalloons; i++) {
        const b = document.createElement('div');
        b.className = 'balloon';
        b.style.cssText = `
          background:${colors[i%colors.length]};
          left:${Math.random()*85}%;
          --speed:${(Math.random()*6+7).toFixed(1)}s;
          --swing-speed:${(Math.random()*2+2).toFixed(1)}s;
          --delay:${(Math.random()*8).toFixed(1)}s;
        `;
        container.appendChild(b);
      }
    })();

    /* ===== CONFETTI & PARTICLES ENGINE ===== */
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    let pieces = [];
    let active = false;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function addConfetti(count, startX, startY) {
      const colors = ['#ff1744','#2979ff','#ffd600','#00e676','#d500f9','#ff6d00'];
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const velocity = Math.random() * 8 + 3;
        pieces.push({
          x: startX !== undefined ? startX : Math.random() * canvas.width,
          y: startY !== undefined ? startY : (Math.random() * -30 - 10),
          w: Math.random() * 9 + 5,
          h: Math.random() * 5 + 2,
          color: colors[Math.floor(Math.random() * colors.length)],
          vx: startX !== undefined ? Math.cos(angle) * velocity : (Math.random() - 0.5) * 3,
          vy: startY !== undefined ? Math.sin(angle) * velocity : Math.random() * 3 + 2.5,
          opacity: 1,
          angle: Math.random() * 360,
          spin: (Math.random() - 0.5) * 0.25
        });
      }
      if (!active) {
        active = true;
        animate();
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pieces = pieces.filter(p => p.opacity > 0.02);
      pieces.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.15; // Gravity
        p.vx *= 0.98; // Friction
        p.angle += p.spin;
        if (p.y > canvas.height || p.x < 0 || p.x > canvas.width) p.opacity -= 0.025;
        ctx.save();
        ctx.globalAlpha = p.opacity;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle * Math.PI / 180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
      });
      if (pieces.length > 0) {
        requestAnimationFrame(animate);
      } else {
        active = false;
      }
    }

    /* ===== INTERACTIONS ===== */
    const charSounds = {
      sonic: new Audio('audio.mp3'),
      goku: new Audio('goku.mp3'),
      spider: new Audio('spiderman.mp3'),
      woody: new Audio('woody.mp3'),
      mario: new Audio('mario.mp3')
    };

    // Función para silenciar/pausar todos los audios y evitar que se solapen
    function pauseAllAudio() {
      Object.values(charSounds).forEach(sound => {
        sound.pause();
        sound.currentTime = 0;
      });
    }

    function charClick(card) {
      // Haptic effect: Shake container slightly
      const container = document.getElementById('main-container');
      container.classList.add('shake-anim');
      setTimeout(() => container.classList.remove('shake-anim'), 400);

      // Confetti effect
      const rect = card.getBoundingClientRect();
      const x = rect.left + rect.width / 2;
      const y = rect.top + rect.height / 2;
      addConfetti(45, x, y);

      // Play specific character audio
      let charKey = '';
      if (card.classList.contains('char-sonic')) charKey = 'sonic';
      else if (card.classList.contains('char-goku')) charKey = 'goku';
      else if (card.classList.contains('char-spider')) charKey = 'spider';
      else if (card.classList.contains('char-woody')) charKey = 'woody';
      else if (card.classList.contains('char-mario')) charKey = 'mario';

      if (charKey && charSounds[charKey]) {
        // Pausar cualquier audio reproduciéndose antes de iniciar el nuevo
        pauseAllAudio();

        // Play
        charSounds[charKey].currentTime = 0;
        charSounds[charKey].play().catch(err => {
          console.log(`Nota: Agrega ${charKey}.mp3 en tu carpeta para escuchar el sonido.`);
        });
      }
    }

    function triggerCardSparkle(card) {
      const rect = card.getBoundingClientRect();
      addConfetti(35, rect.left + rect.width / 2, rect.top + rect.height / 2);
    }



    // Confeti de bienvenida
    window.addEventListener('load', () => {
      setTimeout(() => addConfetti(120), 500);
    });
  </script>
</body>
</html>
